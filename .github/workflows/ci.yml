name: CI — Lint, Test & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  # ── Backend lint & test ──────────────────────────────────────────────────────
  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npx eslint . --ext .js --max-warnings 0 || true

  # ── Frontend build ────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React / Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Security audit ────────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd backend  && npm ci && npm audit --audit-level=high || true
      - run: cd frontend && npm ci && npm audit --audit-level=high || true

  # ── Shell script validation ───────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y shellcheck
      - run: shellcheck install.sh scripts/*.sh

  # ── Release — attach installer tarball ───────────────────────────────────────
  release:
    name: Package Release
    runs-on: ubuntu-latest
    needs: [backend, frontend, shellcheck]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Create release tarball
        run: |
          tar czf openvpn-panel-${{ github.event.release.tag_name }}.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='frontend/node_modules' \
            .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: openvpn-panel-*.tar.gz
