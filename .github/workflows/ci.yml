name: CI — Lint, Test & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  # ── Backend lint & test ──────────────────────────────────────────────────────
  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No cache: here — package-lock.json is not committed.
          # We use npm install (not npm ci) for the same reason.

      - name: Install deps
        run: npm install

      - name: Lint
        run: npx eslint . --ext .js --max-warnings 0 || true

  # ── Frontend build ────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React / Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No cache: here — package-lock.json is not committed.

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          # Path is relative to repo root, not working-directory
          path: frontend/dist/
          retention-days: 7

  # ── Security audit ────────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Audit backend
        run: cd backend  && npm install && npm audit --audit-level=high || true
      - name: Audit frontend
        run: cd frontend && npm install && npm audit --audit-level=high || true

  # ── Shell script validation ───────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      # The scripts source /etc/openvpn-panel/install.conf at runtime.
      # We stub that file here so ShellCheck's -x (follow source) mode
      # doesn't error, and we also tell ShellCheck to treat the missing
      # file as an external source it can't follow (SC1091).
      - name: Stub runtime config for ShellCheck
        run: |
          sudo mkdir -p /etc/openvpn-panel
          sudo tee /etc/openvpn-panel/install.conf > /dev/null << 'EOF'
          SERVER_ADDR="vpn.example.com"
          VPN_PORT="1194"
          VPN_SUBNET="10.8.0.0"
          PANEL_PORT="443"
          ADMIN_USER="admin"
          ADMIN_PASS="placeholder"
          ORG_NAME="MyOrg"
          DEFAULT_CIPHER="AES-256-CBC"
          EOF

      - name: Run ShellCheck
        # SC1091: don't error on sourced files that can't be followed
        # SC2034: don't warn on variables that appear unused in sourced files
        run: |
          shellcheck --severity=error \
            --exclude=SC1091,SC2034 \
            install.sh scripts/*.sh

  # ── Release — attach installer tarball ───────────────────────────────────────
  release:
    name: Package Release
    runs-on: ubuntu-latest
    needs: [backend, frontend, shellcheck]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: cd frontend && npm install && npm run build

      - name: Create release tarball
        run: |
          tar czf openvpn-panel-${{ github.event.release.tag_name }}.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='frontend/node_modules' \
            .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: openvpn-panel-*.tar.gz
